# content of: tox.ini , put in same dir as setup.py
[tox]
envlist = py38,py39
skip_missing_interpreters=True

[testenv:py38]
usedevelop=False
deps = -rrequirements.txt
setenv =
    PYTHONPATH = /opt/pcraster36/python
    PCRASTER_NR_WORKER_THREADS = 4
commands =
    pytest tests/ -s


[testenv:py39]
usedevelop=False
deps = -rrequirements.txt
setenv =
    PYTHONPATH = /opt/pcraster36/python
    PCRASTER_NR_WORKER_THREADS = 4
commands =
    pytest tests/ -s
